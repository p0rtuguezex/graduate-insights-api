version: '3.8'

services:
  graduate-insights-api:
    image: unudev25/graduate-insights-api:latest
    container_name: graduate-insights-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Configuración de base de datos
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/graduate_insights
      - SPRING_DATASOURCE_USERNAME=graduate_user
      - SPRING_DATASOURCE_PASSWORD=graduate_password
      
      # Configuración de correo electrónico
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=garlee016@gmail.com
      - MAIL_PASSWORD=azejzfwfshvwdiok
      - MAIL_SMTP_AUTH=true
      - MAIL_STARTTLS_ENABLE=true
      - MAIL_TIMEOUT=10000
      - MAIL_SSL_TRUST=smtp.gmail.com
      
      # Configuración de CORS
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001,https://graduate-insights.com
      - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS,PATCH
      - CORS_ALLOWED_HEADERS=*
      - CORS_EXPOSED_HEADERS=Authorization,Content-Type,X-Total-Count
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_MAX_AGE=3600
      
      # Configuración JVM para contenedor
      - JAVA_OPTS=-Xms64m -Xmx256m -XX:+UseG1GC -XX:+UseContainerSupport
      
      # Configuración de logging
      - LOGGING_LEVEL_ROOT=INFO
      
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mysql
    networks:
      - graduate-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/graduate-insights/v1/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.0
    container_name: graduate-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=graduate_insights
      - MYSQL_USER=graduate_user
      - MYSQL_PASSWORD=graduate_password
      - MYSQL_ROOT_PASSWORD=root_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/tables.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./src/main/resources/inserts.sql:/docker-entrypoint-initdb.d/2-data.sql
    ports:
      - "3306:3306"
    networks:
      - graduate-network
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:

networks:
  graduate-network:
    driver: bridge
