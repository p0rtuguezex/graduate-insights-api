version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: graduate-insights-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: graduate_insights
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - graduate-network

  app:
    build: .
    container_name: graduate-insights-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/graduate_insights
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - graduate-network
    volumes:
      - ./uploads:/app/uploads

volumes:
  mysql_data:

networks:
  graduate-network:
    driver: bridge
