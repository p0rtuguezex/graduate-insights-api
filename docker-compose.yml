# Docker Compose para desarrollo local
# Buildea la imagen localmente y levanta MySQL
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: graduate-insights-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: graduate_insights
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - graduate-network

  app:
    build: .
    container_name: graduate-insights-api
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    environment:
      # Configuración de base de datos
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/graduate_insights
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      
      # Configuración de correo electrónico
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: garlee016@gmail.com
      MAIL_PASSWORD: azejzfwfshvwdiok
      MAIL_SMTP_AUTH: 'true'
      MAIL_STARTTLS_ENABLE: 'true'
      MAIL_TIMEOUT: 10000
      MAIL_SSL_TRUST: smtp.gmail.com
      
      # Configuración de CORS
      CORS_ALLOWED_ORIGINS: 'http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000'
      CORS_ALLOWED_METHODS: 'GET,POST,PUT,DELETE,OPTIONS,PATCH'
      CORS_ALLOWED_HEADERS: '*'
      CORS_EXPOSED_HEADERS: 'Authorization,Content-Type,X-Total-Count'
      CORS_ALLOW_CREDENTIALS: 'true'
      CORS_MAX_AGE: 3600
      
      # Configuración de archivos
      APP_FILE_UPLOAD_DIR: '/app/uploads/cv'
      
      # Configuración JVM
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      
      # Logging para debugging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_MAIL: DEBUG
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - graduate-network

volumes:
  mysql_data:

networks:
  graduate-network:
    driver: bridge
