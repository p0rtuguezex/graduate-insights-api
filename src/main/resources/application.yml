server:
  port: 8080
  servlet:
    context-path: /graduate-insights/v1/api
spring:
  application:
    name: graduate-insights-api
  servlet:
    multipart:
      location: ${APP_FILE_TMP_DIR:/app/uploads/tmp}
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/graduate_insights?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  sql:
    init:
      mode: always
      schema-locations: classpath:tables.sql
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:garlee016@gmail.com}
    password: ${MAIL_PASSWORD:azejzfwfshvwdiok}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          timeout: ${MAIL_TIMEOUT:5000}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}
          ssl:
            trust: ${MAIL_SSL_TRUST:smtp.gmail.com}

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # 24 horas
      refresh-token:
        expiration: 604800000 # 7 días

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  file:
    upload-dir: ${APP_FILE_UPLOAD_DIR:./uploads/cv}
  seed:
    admin-email: ${APP_SEED_ADMIN_EMAIL:director@university.edu}
    admin-password: ${APP_SEED_ADMIN_PASSWORD:Director123*}

logging:
  level:
    root: INFO
    '[pe.com.graduate.insights.api]': DEBUG
    '[org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer]': error
    '[org.springframework.mail]': DEBUG
    '[org.springframework.mail.javamail]': DEBUG
    '[jakarta.mail]': DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Configuración de CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization,Content-Type,X-Total-Count}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}
